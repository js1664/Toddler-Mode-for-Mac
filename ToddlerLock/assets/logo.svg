<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7EC8F5"/>
      <stop offset="1" stop-color="#9EEBC4"/>
    </linearGradient>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFD54A"/>
      <stop offset="1" stop-color="#FFA726"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Squircle background -->
  <rect x="48" y="48" width="928" height="928" rx="208" ry="208" fill="url(#bg)"/>

  <!-- Shackle made of alphabet blocks -->
  <g filter="url(#shadow)">
    <!-- Left block "A" -->
    <g transform="translate(300,260) rotate(-8)">
      <rect width="150" height="150" rx="24" fill="#E74C3C"/>
      <text x="75" y="108" font-family="Helvetica, Arial, sans-serif" font-weight="900" font-size="110" text-anchor="middle" fill="#FFF">A</text>
    </g>
    <!-- Top block "B" -->
    <g transform="translate(437,210) rotate(0)">
      <rect width="150" height="150" rx="24" fill="#F1C40F"/>
      <text x="75" y="108" font-family="Helvetica, Arial, sans-serif" font-weight="900" font-size="110" text-anchor="middle" fill="#FFF">B</text>
    </g>
    <!-- Right block "C" -->
    <g transform="translate(574,260) rotate(8)">
      <rect width="150" height="150" rx="24" fill="#3498DB"/>
      <text x="75" y="108" font-family="Helvetica, Arial, sans-serif" font-weight="900" font-size="110" text-anchor="middle" fill="#FFF">C</text>
    </g>
  </g>

  <!-- Lock body -->
  <g filter="url(#shadow)">
    <rect x="272" y="430" width="480" height="400" rx="70" ry="70" fill="url(#body)" stroke="#D88A1E" stroke-width="10"/>

    <!-- Smile face -->
    <!-- Eyes -->
    <circle cx="410" cy="580" r="28" fill="#2C3E50"/>
    <circle cx="614" cy="580" r="28" fill="#2C3E50"/>
    <circle cx="418" cy="572" r="9" fill="#FFF"/>
    <circle cx="622" cy="572" r="9" fill="#FFF"/>

    <!-- Blush -->
    <circle cx="360" cy="650" r="22" fill="#FF8A9B" opacity="0.65"/>
    <circle cx="664" cy="650" r="22" fill="#FF8A9B" opacity="0.65"/>

    <!-- Smile -->
    <path d="M 420 660 Q 512 760 604 660" fill="none" stroke="#2C3E50" stroke-width="18" stroke-linecap="round"/>

    <!-- Keyhole as a star -->
    <circle cx="512" cy="745" r="24" fill="#2C3E50"/>
  </g>
</svg>
